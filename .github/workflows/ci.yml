name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cs:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - uses: actions/cache@v4
        id: composer-cache
        with:
          path: |
            vendor/
            ~/.composer/cache/
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-progress --no-interaction --no-scripts

      - uses: actions/cache@v4
        with:
          path: .php-cs-fixer.cache
          key: cs-cache-${{ hashFiles('composer.lock') }}-${{ github.sha }}
          restore-keys: cs-cache-${{ hashFiles('composer.lock') }}-

      - run: composer cs

  stan:
    name: PHPStan (Level 9)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - uses: actions/cache@v4
        id: composer-cache
        with:
          path: |
            vendor/
            ~/.composer/cache/
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-progress --no-interaction --no-scripts

      - uses: actions/cache@v4
        with:
          path: .phpstan-cache/
          key: stan-cache-${{ hashFiles('composer.lock') }}-${{ github.sha }}
          restore-keys: stan-cache-${{ hashFiles('composer.lock') }}-

      - run: composer stan

  unit:
    name: PHPUnit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - uses: actions/cache@v4
        id: composer-cache
        with:
          path: |
            vendor/
            ~/.composer/cache/
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-progress --no-interaction --no-scripts

      - run: composer unit
